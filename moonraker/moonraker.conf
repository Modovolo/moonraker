[server]
host: 0.0.0.0
port: 7125

[authorization]
trusted_clients:
    127.0.0.1
    ::1
    192.168.1.0/24   # adjust for your LAN

[farm_manager]
data_path: /home/ghost/moonraker-data   # optional shared store

[[printer]]
name: bfp1
url: http://bfp1:7125
api_key: <printer1-key>

[[printer]]
name: bfp2
url: http://bfp2:7125
api_key: <printer2-key>
# ...repeat for printers 3–10