name: Moonraker Build Push Deploy

"on":
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag override using short commit SHA by default
        required: false
        default: ""
        type: string
      registry_namespace:
        description: Docker registry namespace
        required: false
        default: jmarji
        type: string
      deploy_namespace:
        description: Kubernetes namespace
        required: false
        default: fleet
        type: string
      run_deploy:
        description: Run deploy job when manually triggered
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: moonraker
  BUILD_CONTEXT: .
  DOCKERFILE_PATH: Dockerfile
  K8S_MANIFEST_PATH: k8s/moonraker.yaml
  DEPLOYMENT_NAME: moonraker

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_namespace: ${{ steps.meta.outputs.registry_namespace }}
      deploy_namespace: ${{ steps.meta.outputs.deploy_namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(jq -r '.inputs.tag // empty' "$GITHUB_EVENT_PATH")"
          REGISTRY_NAMESPACE="$(jq -r '.inputs.registry_namespace // empty' "$GITHUB_EVENT_PATH")"
          DEPLOY_NAMESPACE="$(jq -r '.inputs.deploy_namespace // empty' "$GITHUB_EVENT_PATH")"

          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA:0:12}"
          fi
          if [[ -z "$REGISTRY_NAMESPACE" ]]; then
            REGISTRY_NAMESPACE="jmarji"
          fi
          if [[ -z "$DEPLOY_NAMESPACE" ]]; then
            DEPLOY_NAMESPACE="fleet"
          fi

          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "registry_namespace=$REGISTRY_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "deploy_namespace=$DEPLOY_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail
          test -f "$DOCKERFILE_PATH"
          test -f "$K8S_MANIFEST_PATH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f "$DOCKERFILE_PATH" -t "local/${IMAGE_NAME}:${{ steps.meta.outputs.image_tag }}" "$BUILD_CONTEXT"

  push:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jmarji
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ needs.build.outputs.registry_namespace }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Capture image ref
        id: meta
        shell: bash
        run: |
          echo "image_ref=${{ needs.build.outputs.registry_namespace }}/${IMAGE_NAME}:${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - push
    if: github.event_name == 'push' || github.event.inputs.run_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          LKE_KUBECONFIG: ${{ secrets.LKE_KUBECONFIG }}
        run: |
          set -euo pipefail
          if [[ -z "$LKE_KUBECONFIG" ]]; then
            echo "Missing required secret: LKE_KUBECONFIG"
            exit 1
          fi
          mkdir -p "$HOME/.kube"

          if printf '%s' "$LKE_KUBECONFIG" | grep -q 'apiVersion:'; then
            printf '%s\n' "$LKE_KUBECONFIG" > "$HOME/.kube/config"
          elif ! printf '%s' "$LKE_KUBECONFIG" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "LKE_KUBECONFIG is neither raw kubeconfig nor valid base64"
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"

      - name: Update image and deploy
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${{ needs.push.outputs.image_ref }}"
          NAMESPACE="${{ needs.build.outputs.deploy_namespace }}"
          kubectl apply -f "$K8S_MANIFEST_PATH"
          kubectl set image "deployment/${DEPLOYMENT_NAME}" "${DEPLOYMENT_NAME}=${IMAGE_REF}" -n "$NAMESPACE"
          kubectl rollout status "deployment/${DEPLOYMENT_NAME}" -n "$NAMESPACE" --timeout=180s

          get_deployment_image() {
            local deployment_name="$1"
            local container_name="$2"
            kubectl get deployment "$deployment_name" -n "$NAMESPACE" \
              -o jsonpath="{.spec.template.spec.containers[?(@.name=='$container_name')].image}" 2>/dev/null || true
          }

          extract_image_hash() {
            local image_ref="$1"

            if [[ -z "$image_ref" ]]; then
              echo "n/a"
              return
            fi

            if [[ "$image_ref" == *"@"* ]]; then
              local digest="${image_ref##*@}"
              digest="${digest#sha256:}"
              echo "${digest:0:12}"
              return
            fi

            if [[ "$image_ref" == *":"* ]]; then
              echo "${image_ref##*:}"
              return
            fi

            echo "$image_ref"
          }

          FLEET_MANAGER_HASH="$(extract_image_hash "$(get_deployment_image fleet-manager fleet-manager)")"
          MAINSAIL_HASH="$(extract_image_hash "$(get_deployment_image mainsail mainsail)")"
          BFP_MONITOR_HASH="$(extract_image_hash "$(get_deployment_image bfp-print-monitor bfp-print-monitor)")"
          MOONRAKER_HASH="$(extract_image_hash "$(get_deployment_image moonraker moonraker)")"

          MAINSAIL_CONFIG_JSON="$(kubectl get configmap mainsail-config -n "$NAMESPACE" -o jsonpath='{.data.config\.json}' 2>/dev/null || true)"
          if [[ -n "$MAINSAIL_CONFIG_JSON" ]]; then
            UPDATED_MAINSAIL_CONFIG_JSON="$(printf '%s' "$MAINSAIL_CONFIG_JSON" | jq -c \
              --arg fleetManager "$FLEET_MANAGER_HASH" \
              --arg mainsail "$MAINSAIL_HASH" \
              --arg bfpPrintMonitor "$BFP_MONITOR_HASH" \
              --arg moonraker "$MOONRAKER_HASH" \
              '.containerImageHashes = (.containerImageHashes // {})
               | .containerImageHashes.fleetManager = $fleetManager
               | .containerImageHashes.mainsail = $mainsail
               | .containerImageHashes.bfpPrintMonitor = $bfpPrintMonitor
               | .containerImageHashes.moonraker = $moonraker')"

            PATCH_PAYLOAD="$(jq -cn --arg cfg "$UPDATED_MAINSAIL_CONFIG_JSON" '{data: {"config.json": $cfg}}')"
            kubectl patch configmap mainsail-config -n "$NAMESPACE" --type merge -p "$PATCH_PAYLOAD"
            kubectl rollout restart deployment/mainsail -n "$NAMESPACE" || true
            kubectl rollout status deployment/mainsail -n "$NAMESPACE" --timeout=180s || true
          else
            echo "mainsail-config configmap not found; skipping hash sync"
          fi
