name: Moonraker Build Push Deploy

"on":
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag override using short commit SHA by default
        required: false
        default: ""
        type: string
      registry_namespace:
        description: Docker registry namespace
        required: false
        default: jmarji
        type: string
      deploy_namespace:
        description: Kubernetes namespace
        required: false
        default: fleet
        type: string
      run_deploy:
        description: Run deploy job when manually triggered
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: moonraker
  DOCKER_CONTEXT: .
  DOCKERFILE_PATH: Dockerfile
  K8S_MANIFEST_PATH: k8s/moonraker.yaml
  DEPLOYMENT_NAME: moonraker

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_namespace: ${{ steps.meta.outputs.registry_namespace }}
      deploy_namespace: ${{ steps.meta.outputs.deploy_namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(jq -r '.inputs.tag // empty' "$GITHUB_EVENT_PATH")"
          REGISTRY_NAMESPACE="$(jq -r '.inputs.registry_namespace // empty' "$GITHUB_EVENT_PATH")"
          DEPLOY_NAMESPACE="$(jq -r '.inputs.deploy_namespace // empty' "$GITHUB_EVENT_PATH")"

          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA:0:12}"
          fi
          if [[ -z "$REGISTRY_NAMESPACE" ]]; then
            REGISTRY_NAMESPACE="jmarji"
          fi
          if [[ -z "$DEPLOY_NAMESPACE" ]]; then
            DEPLOY_NAMESPACE="fleet"
          fi

          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "registry_namespace=$REGISTRY_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "deploy_namespace=$DEPLOY_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail
          test -f "$DOCKERFILE_PATH"
          test -f "$K8S_MANIFEST_PATH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f "$DOCKERFILE_PATH" -t "local/${IMAGE_NAME}:${{ steps.meta.outputs.image_tag }}" "$DOCKER_CONTEXT"

  push:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ needs.build.outputs.registry_namespace }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Capture image ref
        id: meta
        shell: bash
        run: |
          echo "image_ref=${{ needs.build.outputs.registry_namespace }}/${IMAGE_NAME}:${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - push
    if: github.event_name == 'push' || github.event.inputs.run_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.FLEET_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$KUBECONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Update image and deploy
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${{ needs.push.outputs.image_ref }}"
          sed -i "s|image: .*|image: ${IMAGE_REF}|g" "$K8S_MANIFEST_PATH"
          kubectl apply -f "$K8S_MANIFEST_PATH"
          kubectl rollout status "deployment/${DEPLOYMENT_NAME}" -n "${{ needs.build.outputs.deploy_namespace }}" --timeout=180s
